name: Build TIPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: TTMigrate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Show Xcode
        run: xcodebuild -version
        working-directory: .

      - name: Install tools
        run: |
          brew install ldid xcodegen
          xcodegen --version
        working-directory: .

      - name: Generate Xcode project
        run: |
          test -f project.yml
          xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project TTMigrate.xcodeproj \
            -scheme TTMigrate \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package tipa
        run: |
          chmod +x scripts/package-tipa.sh
          bash scripts/package-tipa.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TTMigrate-tipa
          path: |
            TTMigrate/dist/*.tipa
            TTMigrate/dist/*.ipa
          if-no-files-found: error
